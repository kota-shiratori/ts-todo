<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>todo</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body class="min-h-screen bg-gray-50 text-gray-800 antialiased">
    <div id="app" class="mx-auto max-w-lg px-4 py-12">
      <h1 class="mb-8 text-center text-3xl font-bold tracking-tight">Todo</h1>
      <form id="todo-form" class="mb-6 flex gap-2">
        <input
          class="flex-1 rounded-lg border border-gray-300 bg-white px-4 py-2.5 text-sm shadow-sm transition placeholder:text-gray-400 focus:border-blue-400 focus:outline-none focus:ring-2 focus:ring-blue-400/30"
          type="text"
          id="todo-input"
          placeholder="やることを入力…"
        />
        <button
          class="shrink-0 cursor-pointer rounded-lg bg-blue-500 px-5 py-2.5 text-sm font-medium text-white shadow-sm transition hover:bg-blue-600 active:scale-95"
          type="submit"
        >
          追加
        </button>
      </form>
      <ul id="todo-list" class="space-y-2"></ul>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
